<body>
<div id="root"></div>
<canvas id="confetti-canvas"></canvas>
<div class="celebrate-overlay" id="celebrate-overlay" onclick="if(event.target===this)hideCelebration()">
  <div class="celebrate-card">
    <video id="celebrate-video" class="celebrate-video" playsinline webkit-playsinline preload="auto"></video>
    <div class="celebrate-emoji" id="celebrate-emoji">🎉</div>
    <div class="celebrate-title">All done for today!</div>
    <div class="celebrate-text" id="celebrate-text"></div>
  </div>
</div>

<script>
const ADMIN = { username: "Nodir", password: "2002Nodir" };
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const EMOJIS = ['💧','🏃','📚','😴','🧘','🥗','💊','🎯','✏️','🎵','🏋️','🧹','🌅','💻','🚴','🍎','🫀','🧠','🎨','🛌'];
const CELEBRATION_PHRASES = [
  "Amazing work! You crushed every habit and task today!",
  "All done! You are on fire today!",
  "Incredible! You completed everything on your list!",
  "Way to go! Today is officially a win!",
  "Fantastic job finishing everything today!"
];

function getKey(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function getDayName(d){return DAY_NAMES[d.getDay()]}
function getDateStr(date){
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(date);d.setHours(0,0,0,0);
  const diff=Math.round((d-today)/86400000);
  if(diff===0)return `Today · ${MONTHS[date.getMonth()]} ${date.getDate()}`;
  if(diff===-1)return `Yesterday · ${MONTHS[date.getMonth()]} ${date.getDate()}`;
  if(diff===1)return `Tomorrow · ${MONTHS[date.getMonth()]} ${date.getDate()}`;
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return `${days[date.getDay()]}, ${MONTHS[date.getMonth()]} ${date.getDate()}`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function lget(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch{return def}}
function lset(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch{}}

function speak(text){
  try{
    if('speechSynthesis' in window){
      window.speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text);
      u.rate=1; u.pitch=1.05; u.volume=1;
      window.speechSynthesis.speak(u);
    }
  }catch(e){}
}
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const colors=['#0a84ff','#ff453a','#30d158','#ff9f0a','#ffffff','#bf5af2'];
  let particles=[];
  for(let i=0;i<130;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:-20-Math.random()*canvas.height*0.6,
      w:5+Math.random()*5,
      h:8+Math.random()*8,
      color:colors[Math.floor(Math.random()*colors.length)],
      vy:2.5+Math.random()*3.5,
      vx:-1.5+Math.random()*3,
      rot:Math.random()*360,
      vr:-6+Math.random()*12
    });
  }
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(frame<170){ requestAnimationFrame(draw); }
    else{ ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  draw();
}
function hideCelebration(){
  const overlay=document.getElementById('celebrate-overlay');
  const video=document.getElementById('celebrate-video');
  overlay.classList.remove('open');
  video.pause();
  video.style.display='none';
  document.getElementById('celebrate-emoji').style.display='block';
}
function showCelebration(){
  const overlay=document.getElementById('celebrate-overlay');
  const video=document.getElementById('celebrate-video');
  const emoji=document.getElementById('celebrate-emoji');
  const phrase=CELEBRATION_PHRASES[Math.floor(Math.random()*CELEBRATION_PHRASES.length)];
  document.getElementById('celebrate-text').textContent=phrase;
  overlay.classList.add('open');

  function fallbackConfettiVoice(){
    video.style.display='none';
    emoji.style.display='block';
    launchConfetti();
    speak(phrase);
    setTimeout(hideCelebration, 3800);
  }

  video.muted=true;
  video.currentTime=0;
  video.src='celebration.mp4';
  video.style.display='block';
  emoji.style.display='none';
  video.onended=()=>{ hideCelebration(); };
  video.onerror=fallbackConfettiVoice;
  const playPromise=video.play();
  if(playPromise&&playPromise.catch){
    playPromise.then(()=>{
      video.muted=false;
      launchConfetti();
    }).catch(fallbackConfettiVoice);
  }
}
function getVisibleTasksFor(data,refKey){
  return data.tasks.filter(t=>!t.dueDate || t.dueDate<=refKey);
}
function maybeCelebrate(data){
  const today=getKey(new Date());
  if(state.celebratedToday===today) return;
  const todayDay=getDayName(new Date());
  const todayComp=data.completions[today]||{};
  const todayHabits=data.habits.filter(h=>h.days.includes(todayDay));
  const doneHabitsCount=todayHabits.filter(h=>todayComp[`h_${h.id}`]).length;
  const visibleTasks=getVisibleTasksFor(data,today);
  const doneTasksCount=visibleTasks.filter(t=>t.done).length;
  const total=todayHabits.length+visibleTasks.length;
  const done=doneHabitsCount+doneTasksCount;
  if(total>0 && done===total){
    state.celebratedToday=today;
    showCelebration();
  }
}

// ── Global state ──
let state = {
  screen: 'login',
  loginMode: 'login',
  loginErr: '',
  currentUser: null,
  tab: 'today',
  viewDate: (()=>{const d=new Date();d.setHours(0,0,0,0);return d})(),
  modal: null,
  editTarget: null,
  form: {},
  adminSelected: null,
  celebratedToday: null,
};

function render(){
  const root=document.getElementById('root');
  if(state.screen==='login') root.innerHTML=renderLogin();
  else if(state.screen==='admin') root.innerHTML=renderAdmin();
  else root.innerHTML=renderApp();
  attachHandlers();
}

// ═══════════ LOGIN ═══════════
function renderLogin(){
  return `
  <div class="login-wrap">
    <div class="login-icon">🎯</div>
    <div class="login-title">Habit Tracker</div>
    <div class="login-sub">${state.loginMode==='login'?'Welcome back':'Create your account'}</div>
    <div class="login-form">
      <input class="m-input" id="li-user" placeholder="Username" autocapitalize="none" value="${esc(state._u||'')}">
      <input class="m-input" id="li-pass" placeholder="Password" type="password" style="margin-bottom:16px" value="${esc(state._p||'')}">
      ${state.loginErr?`<div class="login-err">${esc(state.loginErr)}</div>`:''}
      <button class="btn-primary" style="width:100%;margin-bottom:12px" id="li-submit">${state.loginMode==='login'?'Sign In':'Create Account'}</button>
      <button class="btn-secondary" style="width:100%" id="li-switch">${state.loginMode==='login'?'New here? Sign Up':'Already have account? Sign In'}</button>
    </div>
  </div>`;
}

function doLogin(){
  const uEl=document.getElementById('li-user'), pEl=document.getElementById('li-pass');
  const uname=(uEl.value||'').trim(), pass=pEl.value||'';
  state._u=uname; state._p=pass;
  if(!uname||!pass){state.loginErr='Fill in all fields';render();return}
  if(uname===ADMIN.username && pass===ADMIN.password){
    state.currentUser={username:ADMIN.username,isAdmin:true};
    state.screen='admin'; state.loginErr=''; render(); return;
  }
  const users=lget('users',{});
  const existingKey=Object.keys(users).find(u=>u.toLowerCase()===uname.toLowerCase());
  if(state.loginMode==='login'){
    if(!existingKey){state.loginErr='User not found';render();return}
    if(users[existingKey].password!==pass){state.loginErr='Wrong password';render();return}
    state.currentUser={username:existingKey,isAdmin:false};
  }else{
    if(existingKey||uname.toLowerCase()===ADMIN.username.toLowerCase()){state.loginErr='Username already taken — try another';render();return}
    if(uname.length<3){state.loginErr='Username must be at least 3 characters';render();return}
    users[uname]={password:pass,createdAt:getKey(new Date())};
    lset('users',users);
    state.currentUser={username:uname,isAdmin:false};
  }
  state.loginErr=''; state._u=''; state._p='';
  state.screen='app'; state.tab='today';
  render();
}

// ═══════════ APP DATA HELPERS ═══════════
function loadUserData(uname){ return lget(`user_${uname}`,{habits:[],tasks:[],completions:{}}); }
function saveUserData(uname,data){ lset(`user_${uname}`,data); }

function getHabitStreak(data,id){
  let s=0;const now=new Date();
  for(let i=0;i<365;i++){
    const date=new Date(now.getFullYear(),now.getMonth(),now.getDate()-i);
    const k=getKey(date),dn=getDayName(date);
    const h=data.habits.find(x=>x.id===id);
    if(!h||!h.days.includes(dn))continue;
    if(!(data.completions[k]&&data.completions[k][`h_${id}`]))break;
    s++;
  }
  return s;
}
function getMonthPct(data,id){
  const h=data.habits.find(x=>x.id===id);if(!h)return 0;
  const d=new Date();let scheduled=0,done=0;
  for(let day=1;day<=d.getDate();day++){
    const date=new Date(d.getFullYear(),d.getMonth(),day);
    const dn=getDayName(date);
    if(h.days.includes(dn)){scheduled++;const k=getKey(date);if(data.completions[k]&&data.completions[k][`h_${id}`])done++;}
  }
  return scheduled?Math.round(done/scheduled*100):0;
}
function getAmount(data,id,dateKey){
  return (data.completions[dateKey] && data.completions[dateKey][`amt_${id}`]) || 0;
}
function adjustAmount(data,id,delta){
  const vKey=getKey(state.viewDate);
  data.completions[vKey]=data.completions[vKey]||{};
  let val=(data.completions[vKey][`amt_${id}`]||0)+delta;
  if(val<0)val=0;
  data.completions[vKey][`amt_${id}`]=val;
  const habit=data.habits.find(h=>h.id===id);
  const target=(habit&&habit.target)||1;
  data.completions[vKey][`h_${id}`]=val>=target;
}

function habitCard(h,done,streak,data){
  if(h.trackType==='amount'){
    const vKey=getKey(state.viewDate);
    const current=getAmount(data,h.id,vKey);
    const target=h.target||1;
    const pct=Math.min(100,Math.round((current/target)*100));
    return `<div class="card ${done?'done':''}">
      <div class="check-ring ${done?'done':''}" data-open-log="${h.id}">${done?'<span class="check-icon" style="opacity:1">✓</span>':`<span class="pct-text">${pct}%</span>`}</div>
      <div class="info" data-open-log="${h.id}">
        <div class="h-name ${done?'done':''}">${h.emoji} ${esc(h.name)}</div>
        <div class="h-note">${current} / ${target} ${esc(h.unit||'')}</div>
      </div>
      ${streak>0?`<div class="streak">🔥${streak}</div>`:''}
      <button class="edit-btn" data-edit-habit="${h.id}">✎</button>
    </div>`;
  }
  return `<div class="card ${done?'done':''}">
    <div class="check-ring ${done?'done':''}" data-toggle-habit="${h.id}"><span class="check-icon">✓</span></div>
    <div class="info" data-toggle-habit="${h.id}">
      <div class="h-name ${done?'done':''}">${h.emoji} ${esc(h.name)}</div>
      ${h.note?`<div class="h-note">${esc(h.note)}</div>`:''}
    </div>
    ${streak>0?`<div class="streak">🔥${streak}</div>`:''}
    <button class="edit-btn" data-edit-habit="${h.id}">✎</button>
  </div>`;
}

    el.onclick=()=>{
      const id=el.getAttribute('data-toggle-habit');
      const vKey=getKey(state.viewDate);
      data.completions[vKey]=data.completions[vKey]||{};
      data.completions[vKey][`h_${id}`]=!data.completions[vKey][`h_${id}`];
      saveUserData(uname,data);
      maybeCelebrate(data);
      render();
    };
  });
  document.querySelectorAll('[data-open-log]').forEach(el=>{
    el.onclick=()=>{
      const id=el.getAttribute('data-open-log');
      state.editTarget=id; state.modal='logHabit'; render();
    };
  });
  document.querySelectorAll('[data-toggle-task]').forEach(el=>{
    el.onclick=()=>{
      const id=el.getAttribute('data-toggle-task');
      const t=data.tasks.find(x=>x.id===id);
      if(t){t.done=!t.done;t.doneAt=t.done?getKey(new Date()):null;}
      saveUserData(uname,data);
      maybeCelebrate(data);
      render();
    };
  });

  const dp=document.getElementById('date-prev'), dn=document.getElementById('date-next');
  if(dp) dp.onclick=()=>{
    const nd=new Date(state.viewDate); nd.setDate(nd.getDate()-1); nd.setHours(0,0,0,0);
    state.viewDate=nd;render();
  };
  if(dn) dn.onclick=()=>{
    const nd=new Date(state.viewDate); nd.setDate(nd.getDate()+1); nd.setHours(0,0,0,0);
    const maxDate=new Date(); maxDate.setDate(maxDate.getDate()+90);
    if(nd<=maxDate){state.viewDate=nd;render();}
  };

  const openAdd=document.getElementById('open-add');
  if(openAdd) openAdd.onclick=()=>{
    if(state.tab==='habits'){state.form={name:'',note:'',emoji:'💧',days:['Mon','Tue','Wed','Thu','Fri'],trackType:'simple'};state.editTarget=null;state.modal='habit';}
    else{state.form={name:'',note:'',dueDate:''};state.editTarget=null;state.modal='task';}
    render();
  };

  document.querySelectorAll('[data-edit-habit]').forEach(el=>{
    el.onclick=()=>{
      const id=el.getAttribute('data-edit-habit');
      const h=data.habits.find(x=>x.id===id);
      state.form={...h}; state.editTarget=id; state.modal='editHabit'; render();
    };
  });
  document.querySelectorAll('[data-del-habit]').forEach(el=>{
    el.onclick=(e)=>{
      e.stopPropagation();
      const id=el.getAttribute('data-del-habit');
      data.habits=data.habits.filter(h=>h.id!==id);
      saveUserData(uname,data); render();
    };
  });
  document.querySelectorAll('[data-edit-task]').forEach(el=>{
    el.onclick=()=>{
      const id=el.getAttribute('data-edit-task');
      const t=data.tasks.find(x=>x.id===id);
      state.form={...t,dueDate:t.dueDate||''}; state.editTarget=id; state.modal='editTask'; render();
    };
  });

  const signout=document.getElementById('signout-btn');
  if(signout) signout.onclick=()=>{state.currentUser=null;state.screen='login';state.tab='today';render();};

  const overlay=document.getElementById('modal-overlay');
  if(overlay){
    overlay.onclick=(e)=>{if(e.target===overlay){state.modal=null;render();}};

    if(state.modal==='logHabit'){
      const minusBtn=document.getElementById('log-minus1');
      const addBtn=document.getElementById('log-add-btn');
      const inputEl=document.getElementById('log-amount-input');
      if(minusBtn) minusBtn.onclick=()=>{
        adjustAmount(data,state.editTarget,-1);
        saveUserData(uname,data);
        maybeCelebrate(data);
        render();
      };
      if(addBtn) addBtn.onclick=()=>{
        const v=parseFloat(inputEl.value);
        if(!isNaN(v) && v!==0){
          adjustAmount(data,state.editTarget,v);
          saveUserData(uname,data);
          maybeCelebrate(data);
        }
        render();
      };
      if(inputEl) inputEl.onkeydown=e=>{if(e.key==='Enter')addBtn.click();};
      const cancelBtn=document.getElementById('modal-cancel');
      if(cancelBtn) cancelBtn.onclick=()=>{state.modal=null;render();};
      return;
    }

    document.querySelectorAll('[data-pick-emoji]').forEach(el=>{
      el.onclick=()=>{state.form.emoji=el.getAttribute('data-pick-emoji');render();};
    });
    document.querySelectorAll('[data-set-tracktype]').forEach(el=>{
      el.onclick=()=>{
        state.form.trackType=el.getAttribute('data-set-tracktype');
        render();
      };
    });
    document.querySelectorAll('[data-toggle-day]').forEach(el=>{
      el.onclick=()=>{
        const d=el.getAttribute('data-toggle-day');
        state.form.days=state.form.days||[];
        state.form.days=state.form.days.includes(d)?state.form.days.filter(x=>x!==d):[...state.form.days,d];
        render();
      };
    });
    const nameEl=document.getElementById('form-name'), noteEl=document.getElementById('form-note'), dueEl=document.getElementById('form-due');
    const targetEl=document.getElementById('form-target'), unitEl=document.getElementById('form-unit');
    if(nameEl) nameEl.oninput=()=>{state.form.name=nameEl.value;};
    if(noteEl) noteEl.oninput=()=>{state.form.note=noteEl.value;};
    if(dueEl) dueEl.oninput=()=>{state.form.dueDate=dueEl.value;};
    if(targetEl) targetEl.oninput=()=>{state.form.target=targetEl.value;};
    if(unitEl) unitEl.oninput=()=>{state.form.unit=unitEl.value;};

    const cancelBtn=document.getElementById('modal-cancel');
    if(cancelBtn) cancelBtn.onclick=()=>{state.modal=null;render();};

    const delBtn=document.getElementById('modal-delete');
    if(delBtn) delBtn.onclick=()=>{
      if(state.modal==='editHabit'){data.habits=data.habits.filter(h=>h.id!==state.editTarget);}
      else{data.tasks=data.tasks.filter(t=>t.id!==state.editTarget);}
      saveUserData(uname,data); state.modal=null; render();
    };

    const saveBtn=document.getElementById('modal-save');
    if(saveBtn) saveBtn.onclick=()=>{
      const isHabit=state.modal==='habit'||state.modal==='editHabit';
      const f=state.form;
      if(!f.name||!f.name.trim())return;
      if(isHabit){
        if(!(f.days&&f.days.length))return;
        if(f.trackType==='amount'){
          const t=parseFloat(f.target);
          if(!t||t<=0)return;
        }
        const cleanData={
          ...f,
          name:f.name.trim(),
          note:(f.note||'').trim(),
          trackType:f.trackType==='amount'?'amount':'simple',
          target:f.trackType==='amount'?parseFloat(f.target):undefined,
          unit:f.trackType==='amount'?(f.unit||'').trim():undefined
        };
        if(state.editTarget){
          data.habits=data.habits.map(h=>h.id===state.editTarget?{...h,...cleanData}:h);
        }else{
          data.habits.push({id:Date.now().toString(),...cleanData,createdAt:getKey(new Date())});
        }
      }else{
        const cleanData={...f,name:f.name.trim(),note:(f.note||'').trim(),dueDate:f.dueDate||null};
        if(state.editTarget){
          data.tasks=data.tasks.map(t=>t.id===state.editTarget?{...t,...cleanData}:t);
        }else{
          data.tasks.push({id:Date.now().toString(),...cleanData,done:false,createdAt:getKey(new Date())});
        }
      }
      saveUserData(uname,data); state.modal=null; render();
    };
  }
}

render();
</script>
</body>
</html>
